
services:
  db:
    image: mysql:8.0
    container_name: rbac-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1113
      MYSQL_DATABASE: rbac
      MYSQL_USER: rbac_user
      MYSQL_PASSWORD: rbac_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  server:
    build: ./server
    container_name: rbac-server
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USER: rbac_user
      DB_PASSWORD: rbac_pass
      DB_NAME: rbac
      DB_PORT: 3306
    command: ["go", "run", "main.go"]

  client:
    build: ./client
    container_name: rbac-client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server
    command: ["npm", "run", "dev", "--", "--host"]

volumes:
  db_data: